server:
  host: 0.0.0.0
  port: 4096
  base_path: /tejo9855/eventrelation
  workers: 2
  timeout: 120

server_name: potato annotator
annotation_task_name: Event Relation Annotation

task_dir: .
site_dir: default

output_annotation_dir: annotation_output/results/
output_annotation_format: csv

annotation_codebook_url: ""

data_files:
  - data/dolma_final_sample_s55_n1000_t0.5_llm_summary_safeid_with_spans.csv

item_properties:
  id_key: safe_instance_id
  text_key: sampled_text

pair_assignment_policy:
  # Weighted schedule across texts; default 2:1 (sim:mix).
  # Examples:
  # - 3:1 with spaCy-only third mode:
  #   - { mode: sim,   weight: 3 }
  #   - { mode: spacy, weight: 1 }
  schedule:
    - mode: sim
      weight: 4
    - mode: mix
      weight: 1

  # Define what each mode means by span type set.
  # sim   = SIM event labels
  # spacy = spaCy verb labels
  # mix   = union of whichever span types you include
  mode_definitions:
    sim:
      span_types: [event]
    spacy:
      span_types: [verb]
    mix:
      span_types: [event, verb]

event_helper:
  title: "What counts as an event?"
  description: >
    Events are singular, bounded occurrences where something happens at a particular point in time. 
    \n\nThe highlighted spans are event triggers. Event triggers are the smallest units that can be identified as events. 
    \n\nWhen considering whether a span qualifies as an event, try to determine the full event indicated by the highlighted span.
    \n\nA span qualifies as an event if you can identify what happened AND who or what it happened to from the surrounding text. 
    \n\nDO NOT consider hypothetical or future events that are not clearly indicated as having occurred in the text.

pair_question_text:
  sequencing_title: "Event Sequentiality"
  sequencing_question: "Does Event 1 come before Event 2?"
  sequencing_description: >
    Events can be sequential (Event 1 happens before Event 2) or non-sequential (Event 1 and Event 2 are simultaneous, unordered, or temporally ambiguous).
    \n\nThe sequentiality can be explicit (e.g. "Event 1 happened, then Event 2") or implicit (e.g. "He bought ice cream. She topped the ice cream with sprinkles.").
  sequencing_left_label: "No clear sequence"
  sequencing_right_label: "Very strong sequence"
  causality_title: "Event Causality"
  causality_question: "How are events 1 and 2 causally related?"
  causality_description: >
    Consider two types of causality: direct causality and enablement. Direct causality is when Event 1 directly causes Event 2 (e.g. "He tripped on the rock, causing him to fall").
    \n\nEnablement is when Event 1 sets the stage for Event 2 but does not directly cause it (e.g. "She bought a ticket. She boarded the train.").
    \n\nUse your world knowledge. There will be implicit cases that require you to infer causality based on what you know about how the world works (e.g. "She bought a ticket. She boarded the train." implies that buying the ticket enabled her to board the train, even though it doesn't explicitly say that).

user_config:
  allow_all_users: true
  users: []

list_as_text:
  text_list_prefix_type: none
  horizontal: true

alert_time_each_instance: 100000

annotation_schemes:
  - annotation_type: text
    name: event_sequencing
    description: "Event Annotation (sequencing + causality)"
    label_requirement:
      required: false


ui:
  show_progress: true
  show_instructions: true
  allow_navigation: true
  allow_editing: true

instance_display:
  resizable: false
  fields:
    - key: id
      type: text
    - key: folder
      type: text
    - key: topic_classification
      type: text
    - key: llm_summary
      type: text
    - key: sampled_text
      type: text

task_layout: layouts/task_layout_custom.html

admin_api_key: "test"