server:
  host: 0.0.0.0
  port: 4097
  base_path: /tejo9855/agency
  workers: 2
  timeout: 120

server_name: potato annotator
annotation_task_name: Agency Annotation

task_dir: .

data_files:
  - data/dolma_combined_final_sample_700_with_llm_summary_safeid_with_spans.csv
output_annotation_dir: annotation_output/results/
output_annotation_format: json
annotation_codebook_url: ""

item_properties:
  id_key: safe_instance_id
  text_key: sampled_text
  kwargs:
    - source
    - llm_summary
    - id
    - folder
    - topic_classification

user_config:
  allow_all_users: true
  users: []

list_as_text:
  text_list_prefix_type: none
  horizontal: true

alert_time_each_instance: 100000

annotation_schemes:
  - annotation_type: likert
    name: agency_focalization
    description: "How central is a specific character's perspective to the text?"
    extended_description: "A higher score reflects a narrative in which the text is primarily presented through a specific character's perspective: their perceptions, thoughts, and feelings shape how the story is told. A lower score reflects a narrative that reports the text from the outside, describing what is observable without granting access to any character's internal experience. For example, \"she scanned the faces in the crowd, certain that someone was watching her\" scores higher than \"she walked through the crowd.\""
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

  - annotation_type: likert
    name: agency_emotion
    description: "How central are a character's emotional states to the text?"
    extended_description: "A higher score reflects text in which a character's emotional experience is a prominent feature. A lower score reflects text with little or no reference to how a character feels. For example, \"he was flooded with relief when he heard her voice\" scores higher than \"he answered the phone.\""
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

  - annotation_type: likert
    name: agency_cognition
    description: "How central are a character's thoughts and reasoning to the text?"
    extended_description: "A higher score reflects text in which a character's thoughts, beliefs, reasoning, or mental reflections are a prominent feature. A lower score reflects text with little or no reference to what a character thinks or knows. For example, \"she kept turning the problem over in her mind, convinced there was something she had missed\" scores higher than \"she sat at her desk.\""
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

  - annotation_type: likert
    name: agency_motivation
    description: "How central are a character's motivations, desires, or intentions to the text?"
    extended_description: "A higher score reflects text in which a character wants, hopes, or aspirations are a prominent feature. A lower score reflects text with little or no reference to a character's goals or desires. For example, \"he was determined to finish the job before anyone found out\" scores higher than \"he worked through the night.\""
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

  - annotation_type: likert
    name: agency_change_of_state
    description: "How central is a change in an character's condition or state to the text?"
    extended_description: "A higher score reflects text in which a change in an character's condition/state is a prominent or organizing feature of the passage. A lower score reflects text where characters remain essentially unchanged, or where any change is only faintly implied. Note that the change does not need to be completed within the passage, an in-progress or partially implied change still counts. For example, \"by the time she reached the door, something in her had shifted. She wasn't the same person who had walked in\" scores higher than \"she left the building.\""
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

  - annotation_type: likert
    name: agency_conflict
    description: "How central is conflict involving characters to the text?"
    extended_description: "A higher score reflects text in which conflict is a dominant or organizing feature. A lower score reflects text in which conflict is absent or only incidentally present. Conflict can take many forms, including tension between characters, internal psychological struggle, or opposition to institutions, environments, inanimate objects like technology, or social forces. For example, \"they had been arguing for hours, neither willing to give ground\" scores higher than \"they sat across from each other at the table.\""
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

ui:
  show_progress: true
  show_instructions: true
  allow_navigation: true
  allow_editing: true

instance_display:
  resizable: false
  fields:
    - key: source
      type: text
    - key: llm_summary
      type: text
    - key: sampled_text
      type: text

task_layout: layouts/task_layout_custom.html
site_dir: default
