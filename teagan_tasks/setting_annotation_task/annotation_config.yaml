server:
  host: 0.0.0.0
  port: 4098
  base_path: /tejo9855/setting
  workers: 2
  timeout: 120

server_name: potato annotator
annotation_task_name: Setting Annotation

task_dir: .

data_files:
  - data/dolma_final_sample_s67_n1000_t0.5_llm_summary_safeid_with_spans.csv
output_annotation_dir: annotation_output/results/
output_annotation_format: json
annotation_codebook_url: "https://docs.google.com/document/d/1JSABU6YoxlWyzOmb4KBM1CwSG-xu9ofAihqXzsFTTUE/edit?usp=sharing"

item_properties:
  id_key: safe_instance_id
  text_key: sampled_text
  kwargs:
    - source
    - llm_summary
    - id
    - folder
    - topic_classification

user_config:
  allow_all_users: true
  users: []

list_as_text:
  text_list_prefix_type: none
  horizontal: true

alert_time_each_instance: 100000

annotation_schemes:
  - annotation_type: likert
    name: setting_concreteness
    description: "How concrete is the language of the text? That is, how much does the text refer to things that can be directly experienced through the senses or through action, as opposed to things whose meaning depends on other words?"
    extended_description: "Some text refers to things and actions in reality that can be experienced directly through the five senses or through physical action. We call this concrete language. Other text refers to meanings that cannot be experienced directly, but which we understand because they can be defined or explained using other words. We call this abstract language. A higher score reflects text in which most content could be explained by pointing, demonstrating, or showing (objects, physical states, bodily actions, perceptual qualities). A lower score reflects text in which most content can only be explained using other words (categories, principles, relationships, institutions, ideas). \n\nAsk yourself: could the main content of this passage be explained to someone by showing them something, or does it require verbal definition? \n\nHigh: the chipped blue mug sat on the edge of the sink, handle cracked from years of use (you could point to the mug, the crack, the sink). \nLow: people often form attachments to everyday objects (there is nothing to point to; the meaning depends entirely on understanding 'attachment', 'form', 'everyday'). \n\nNote: named entities (people, places, organizations) do not automatically raise the score. What matters is whether the text renders something perceptually present, not just nominally specific."
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

  - annotation_type: likert
    name: setting_temporal_grounding
    description: "How strongly does the text create a sense of being anchored in a particular time? (e.g., references to specific dates or periods, but also atmosphere, tone, or detail that evokes a strong sense of when events are taking place)"
    extended_description: "A higher score reflects text that creates a vivid sense of temporal location: the reader feels situated in a particular moment, era, or duration, whether through explicit markers or evocative detail. A lower score reflects text that feels temporally unanchored, as if events could be taking place at any time. \n\nFor example, \"the streets were still empty, that particular quiet of early Sunday morning before the city remembered itself\" scores higher than \"he walked outside.\" because the first text evokes a specific temporal atmosphere, while the second text could be happening at any time. \n\nKeep in mind, this is not just about explicit mentions of dates or time periods, but about whether the text creates a strong sense of time through description and atmosphere."
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

  - annotation_type: likert
    name: setting_spatial_grounding
    description: "How strongly does the text create a sense of being anchored in a particular place? (e.g., could be named locations, but also atmosphere, tone, or detail that evokes a strong sense of where events are taking place)"
    extended_description: "A higher score reflects text that creates a vivid sense of physical location: you (the reader) feel like you can envision yourself in a particular location or setting, whether through explicit description or evocative detail. A lower score reflects text that feels spatially unanchored, as if events could be taking place anywhere. \n\nFor example, \"the alley smelled of wet concrete and something burned, neon from the bar across the street bleeding red into the puddles\" scores higher than \"he stepped outside.\"\n\nKeep in mind, this is not just about nominal mentions of places or locations, but about whether the text creates a strong sense of place through description and atmosphere."
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

  - annotation_type: likert
    name: setting_sensory
    description: "How central are sensory details to the text? (e.g., descriptions involving sight, sound, smell, taste, or touch)"
    extended_description: "A higher score reflects text in which sensory experience is a prominent and sustained feature. You are consistently given information about how the world looks, sounds, smells, feels, or tastes. A lower score reflects text with little or no sensory content, where events and ideas are conveyed without appeal to the senses. \n\nFor example, \"the bread was still warm, its crust crackling under her fingers, the whole kitchen thick with the smell of it\" scores higher than \"she made breakfast which consisted of bread and eggs.\" because the first text is clearly invoking your sense of smell."
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

ui:
  show_progress: true
  show_instructions: true
  allow_navigation: true
  allow_editing: true

instance_display:
  resizable: false
  fields:
    - key: source
      type: text
    - key: llm_summary
      type: text
    - key: sampled_text
      type: text

task_layout: layouts/task_layout_custom.html
site_dir: custom_templates
