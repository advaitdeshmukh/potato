server:
  host: 0.0.0.0
  port: 4098
  base_path: /tejo9855/setting
  workers: 2
  timeout: 120

server_name: potato annotator
annotation_task_name: Setting Annotation

task_dir: .

data_files:
  - data/dolma_combined_final_sample_700_with_llm_summary_safeid_with_spans.csv
output_annotation_dir: annotation_output/results/
output_annotation_format: json
annotation_codebook_url: ""

item_properties:
  id_key: safe_instance_id
  text_key: sampled_text
  kwargs:
    - source
    - llm_summary
    - id
    - folder
    - topic_classification

user_config:
  allow_all_users: true
  users: []

list_as_text:
  text_list_prefix_type: none
  horizontal: true

alert_time_each_instance: 100000

annotation_schemes:
  - annotation_type: likert
    name: setting_concreteness
    description: "How concrete and specific is the text, as opposed to abstract or general? (e.g., references to particular objects, places, or physical details rather than abstract ideas)"
    extended_description: "A higher score reflects text that is predominantly grounded in specific, tangible details: the world of the text feels particular and material rather than abstract or general. A lower score reflects text that deals primarily in abstract ideas, generalizations, or concepts without grounding them in concrete particulars. For example, \"the chipped blue mug sat on the edge of the sink, handle cracked from years of use\" scores higher than \"people often form attachments to everyday objects.\""
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

  - annotation_type: likert
    name: setting_temporal_grounding
    description: "How strongly does the text create a sense of being anchored in a particular time? (e.g., references to specific dates or periods, but also atmosphere, tone, or detail that evokes a strong sense of when events are taking place)"
    extended_description: "A higher score reflects text that creates a vivid sense of temporal location: the reader feels situated in a particular moment, era, or duration, whether through explicit markers or evocative detail. A lower score reflects text that feels temporally unanchored, as if events could be taking place at any time. For example, \"the streets were still empty, that particular quiet of early Sunday morning before the city remembered itself\" scores higher than \"he walked outside.\""
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

  - annotation_type: likert
    name: setting_spatial_grounding
    description: "How strongly does the text create a sense of being anchored in a particular place? (e.g., named locations, but also atmosphere, tone, or detail that evokes a strong sense of where events are taking place)"
    extended_description: "A higher score reflects text that creates a vivid sense of physical location: the reader feels situated in a particular environment or setting, whether through explicit description or evocative detail. A lower score reflects text that feels spatially unanchored, as if events could be taking place anywhere. For example, \"the alley smelled of wet concrete and something burned, neon from the bar across the street bleeding red into the puddles\" scores higher than \"he stepped outside.\""
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

  - annotation_type: likert
    name: setting_sensory
    description: "How central are sensory details to the text? (e.g., descriptions involving sight, sound, smell, taste, or touch)"
    extended_description: "A higher score reflects text in which sensory experience is a prominent and sustained feature: the reader is consistently given information about how the world looks, sounds, smells, feels, or tastes. A lower score reflects text with little or no sensory content, where events and ideas are conveyed without appeal to the senses. For example, \"the bread was still warm, its crust crackling under her fingers, the whole kitchen thick with the smell of it\" scores higher than \"she made breakfast.\""
    size: 5
    min_label: "Not at all"
    max_label: "Extremely"
    label_requirement:
      required: false

ui:
  show_progress: true
  show_instructions: true
  allow_navigation: true
  allow_editing: true

instance_display:
  resizable: false
  fields:
    - key: source
      type: text
    - key: llm_summary
      type: text
    - key: sampled_text
      type: text

task_layout: layouts/task_layout_custom.html
site_dir: custom_templates
