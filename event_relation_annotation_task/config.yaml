server:
  host: 0.0.0.0
  port: 4096
  base_path: /tejo9855/eventrelation
  workers: 2
  timeout: 120

server_name: potato annotator
annotation_task_name: Event Relation Annotation

task_dir: .
site_dir: default

output_annotation_dir: annotation_output/results/
output_annotation_format: csv

annotation_codebook_url: ""

data_files:
  - data/dolma_combined_final_sample_600_with_llm_summary_safeid_with_spans.csv

item_properties:
  id_key: safe_instance_id
  text_key: sampled_text

pair_assignment_policy:
  # Weighted schedule across texts; default 2:1 (sim:mix).
  # Examples:
  # - 3:1 with spaCy-only third mode:
  #   - { mode: sim,   weight: 3 }
  #   - { mode: spacy, weight: 1 }
  schedule:
    - mode: sim
      weight: 2
    - mode: mix
      weight: 1

  # Define what each mode means by span type set.
  # sim   = SIM event labels
  # spacy = spaCy verb labels
  # mix   = union of whichever span types you include
  mode_definitions:
    sim:
      span_types: [event]
    spacy:
      span_types: [verb]
    mix:
      span_types: [event, verb]

event_helper:
  title: "What counts as an event?"
  description: >
    Events are singular, bounded occurrences where something happens at a particular point in time. 
    The highlighted spans are event triggers. Event triggers are the smallest units that can be identified as events. 
    When considering whether a span qualifies as an event, try to determine the full event indicated by the highlighted span.
    A span qualifies as an event if you can identify what happened AND 
    who or what it happened to from the surrounding text. DO NOT consider hypothetical or future events that are not clearly indicated as having occurred in the text.

pair_question_text:
  sequencing_title: "Event Sequentiality"
  sequencing_question: "How clearly does the text establish that Event 1 comes before Event 2?"
  sequencing_description: >
    Rate the strength of the temporal ordering between the two highlighted events. 
    A high score means the text clearly establishes that one event precedes the other either through 
    explicit markers ("then," "afterward," "the next day") or strong narrative implication. 
    A low score means the events feel temporally unordered, simultaneous, or ambiguous in sequence.
  sequencing_left_label: "No clear sequence"
  sequencing_right_label: "Very strong sequence"
  causality_title: "Event Causality"
  causality_question: "How strongly does the text support that Event 1 was necessary for Event 2 to occur?"
  causality_description: >
    Rate how strongly the text supports a causal relationship between the two highlighted events. 
    Causality includes both direct cause (Event 1 actively produces Event 2; 
    e.g. "the pipe burst" -> "the basement flooded") 
    and enablement (Event 1 creates the conditions that make Event 2 possible; 
    e.g. "she bought a ticket" -> "she boarded the train"). Use your world knowledge. 
    If the causal link is obvious even without explicit markers, score it accordingly. 
    Explicit causal language ("because," "so," "as a result") should typically receive the highest scores.
  causality_left_label: "No causal link"
  causality_right_label: "Very strong, explicit causality"

user_config:
  allow_all_users: true
  users: []

list_as_text:
  text_list_prefix_type: none
  horizontal: true

alert_time_each_instance: 100000

annotation_schemes:
  - annotation_type: text
    name: event_sequencing
    description: "Event Annotation (sequencing + causality)"
    label_requirement:
      required: false


ui:
  show_progress: true
  show_instructions: true
  allow_navigation: true
  allow_editing: true

instance_display:
  resizable: false
  fields:
    - key: id
      type: text
    - key: folder
      type: text
    - key: topic_classification
      type: text
    - key: llm_summary
      type: text
    - key: sampled_text
      type: text

task_layout: layouts/task_layout_custom.html

admin_api_key: "test"