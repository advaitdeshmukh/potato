server:
  host: 0.0.0.0
  port: 9004
  base_path: /editlabelval
  workers: 2
  timeout: 120

server_name: potato annotator
annotation_task_name: Prompt Edit Label Validation

task_dir: .
site_dir: default
task_layout: layouts/task_layout.html

output_annotation_dir: data/annotations/pairwise-edit-label-validation/
output_annotation_format: jsonl

annotation_codebook_url: ""

data_files:
  - data/prompt-pair-edit-label-validation-input.jsonl

item_properties:
  id_key: id
  text_key: text
  kwargs:
    - predicted_label_text
    - predicted_direction
    - predicted_target
    - source_example_id
    - predicted_label_rank
    - source_label_count

list_as_text:
  text_list_prefix_type: alphabet

user_config:
  allow_all_users: true
  users: []

jumping_to_id_disabled: true

alert_time_each_instance: 10000000
horizontal_key_bindings: true

annotation_schemes:
  - annotation_type: pairwise
    name: pair_display
    description: Prompt pair display
    mode: binary
    items_key: text
    item_display_mode: side_by_side
    show_item_diff: true
    diff_granularity: word
    diff_ignore_case: true
    diff_ignore_punctuation: true
    item_labels:
      - "Prompt A"
      - "Prompt B"
    labels:
      - "A"
      - "B"
    sequential_key_binding: false
    label_requirement:
      required: false

  - annotation_type: radio
    name: model_label_correct
    description: Is the model label correct for this prompt edit?
    labels:
      - "Yes"
      - "No"
    sequential_key_binding: true
    label_requirement:
      required: true

admin_api_key: "test"
