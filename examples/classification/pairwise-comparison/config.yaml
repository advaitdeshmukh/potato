server:
  host: 0.0.0.0
  port: 9001
  workers: 2
  timeout: 120

server_name: potato annotator
annotation_task_name: Prompt Edit Validation

task_dir: .
site_dir: default
task_layout: layouts/task_layout.html

output_annotation_dir: data/annotations/simple-pairwise/
output_annotation_format: tsv

annotation_codebook_url: ""

data_files:
  - data/pairwise-prompt-clusters.jsonl

item_properties:
  id_key: id
  text_key: text

list_as_text:
  text_list_prefix_type: alphabet

user_config:
  allow_all_users: false
  users:
    - annotator1
    - annotator2

jumping_to_id_disabled: true

surveyflow:
  "on": false
  order:
    - pre_annotation
    - post_annotation
  pre_annotation:
    - data/surveyflow/intro.jsonl
    - data/surveyflow/consent.jsonl
  post_annotation:
    - data/surveyflow/demographic_questions.jsonl
    - data/surveyflow/end.jsonl

automatic_assignment:
  "on": false
  output_filename: task_assignment.json
  sampling_strategy: random
  labels_per_instance: 2
  instance_per_annotator: 1
  users: []

alert_time_each_instance: 10000000
horizontal_key_bindings: true

annotation_schemes:
  - annotation_type: pairwise
    name: preference
    description: Are these prompts edited from each other?
    mode: binary
    items_key: text
    item_display_mode: side_by_side
    show_item_diff: true
    diff_granularity: word
    diff_ignore_case: true
    diff_ignore_punctuation: true
    show_labels: true
    item_labels:
      - "Prompt A"
      - "Prompt B"
    labels:
      - "Yes"
      - "No"
    allow_tie: true
    tie_label: "Hard to tell"
    sequential_key_binding: true
    label_requirement:
      required: true

admin_api_key: "test"
